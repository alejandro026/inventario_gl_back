# ===============================
# Aplicacion
# ===============================
spring.application.name=Inventario
server.port=8080

# ===============================
# DataSource (PostgreSQL)
# ===============================
#spring.datasource.url=${DB_URL_PROD}
#spring.datasource.username=${DB_USER_PROD}
#spring.datasource.password=${DB_PASSWORD_PROD}
#spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.url=jdbc:postgresql://localhost:5432/papeleria
spring.datasource.username=postgres
spring.datasource.password=secret123

#poll
spring.datasource.hikari.maximum-pool-size=5

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ===============================
# JWT
# ===============================
app.jwt.secret=Y2FtYmlhLWVzdGEtY2xhdmUtcG9yLXVuYS1tYXMtbGFyZ2EtZW4tcHJvZHVjY2lvbg==
app.jwt.expiration-ms=86400000
app.jwt.issuer=papeleria-inventario

# ===============================
# Swagger / OpenAPI
# ===============================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# ===============================
# Logging
# ===============================
logging.level.org.springframework.security=INFO
logging.level.com.guerrero.Inventario=DEBUG
